<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Apprendre Français ↔ Vietnamien — Programme complet</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Be+Vietnam+Pro:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--r:#C0392B;--g:#D4A017;--c:#FDF6E3;--d:#1A1008;--n:#1B2A4A;--gr:#2E6B4F;--lr:#FDECEA;--lg:#FEF9EC;--b:#E8D9B5;--pu:#6C3483;--or:#E67E22;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Be Vietnam Pro',sans-serif;background:var(--c);color:var(--d);min-height:100vh;}
header{background:var(--n);color:white;padding:14px 28px;display:flex;align-items:center;justify-content:space-between;border-bottom:4px solid var(--g);position:sticky;top:0;z-index:200;}
.logo{display:flex;align-items:center;gap:10px;}
header h1{font-family:'Playfair Display',serif;font-size:1.25rem;}
header h1 span{display:block;font-size:0.65rem;font-weight:300;color:var(--g);letter-spacing:2px;text-transform:uppercase;font-family:'Be Vietnam Pro',sans-serif;}
.hstats{display:flex;align-items:center;gap:14px;}
.sb{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:8px;padding:6px 14px;text-align:center;font-size:0.72rem;color:rgba(255,255,255,0.6);min-width:64px;}
.sb strong{display:block;font-size:1.3rem;color:var(--g);font-family:'Playfair Display',serif;}
.streak-box{background:rgba(255,100,0,0.2);border:1px solid rgba(255,150,0,0.4);border-radius:8px;padding:6px 12px;font-size:0.78rem;color:#FFAA44;display:none;white-space:nowrap;}
.lvl-box{background:rgba(108,52,131,0.3);border:1px solid rgba(180,100,255,0.4);border-radius:8px;padding:6px 12px;font-size:0.72rem;color:#CF9FFF;}
.lvl-box span{font-size:1.1rem;font-weight:700;color:#E0BBFF;}
nav{background:white;border-bottom:2px solid var(--b);padding:0 16px;display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
nav::-webkit-scrollbar{display:none;}
.ct{padding:11px 14px;cursor:pointer;font-size:0.77rem;font-weight:500;color:#888;border:none;border-bottom:3px solid transparent;background:none;font-family:'Be Vietnam Pro',sans-serif;white-space:nowrap;transition:all 0.2s;}
.ct:hover{color:var(--n);}.ct.active{color:var(--r);border-bottom-color:var(--r);font-weight:600;}
.ct.done{color:var(--gr);}
.ct.done::after{content:'✓';margin-left:4px;font-size:0.65rem;}
.mw{max-width:1100px;margin:0 auto;padding:28px 16px 80px;}
.cs{display:none;}.cs.active{display:block;}
.sh{text-align:center;margin-bottom:26px;}
.sh .be{font-size:2.6rem;display:block;margin-bottom:8px;}
.sh h2{font-family:'Playfair Display',serif;font-size:1.8rem;color:var(--n);}
.sh .st{font-size:0.9rem;color:var(--r);margin-top:3px;font-weight:300;letter-spacing:1px;}
.pn{margin:10px auto 0;max-width:720px;background:var(--lg);border-left:4px solid var(--g);padding:10px 16px;border-radius:0 8px 8px 0;font-size:0.83rem;color:#555;text-align:left;line-height:1.75;}
.bt{display:flex;align-items:center;gap:9px;font-family:'Playfair Display',serif;font-size:1rem;color:var(--n);margin:22px 0 10px;padding-bottom:6px;border-bottom:2px solid var(--b);}
.bn{background:var(--r);color:white;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.7rem;font-weight:700;flex-shrink:0;}
.vg{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:9px;margin-bottom:6px;}
.vh{font-size:0.72rem;color:#bbb;margin-bottom:8px;}
.vc{background:white;border:2px solid var(--b);border-radius:11px;padding:12px;cursor:pointer;transition:all 0.22s;min-height:85px;position:relative;}
.vc:hover{border-color:var(--r);transform:translateY(-2px);box-shadow:0 4px 16px rgba(192,57,43,0.1);}
.vc.done-card{border-color:var(--gr);opacity:0.7;}
.vc .wp{font-family:'Playfair Display',serif;font-size:1rem;color:var(--n);font-weight:700;}
.vc .pr{font-size:0.63rem;color:#bbb;margin:3px 0;font-style:italic;}
.vc .ws{font-size:0.88rem;color:var(--r);font-weight:600;margin-top:5px;display:none;}
.vc .ex{font-size:0.69rem;color:#777;margin-top:5px;line-height:1.5;display:none;border-top:1px solid var(--b);padding-top:5px;}
.vc.open .ws{display:block;}.vc.open .ex{display:block;}
.vc .tap{float:right;font-size:0.56rem;color:#ccc;text-transform:uppercase;letter-spacing:1px;margin-top:2px;}
.dw{background:white;border:1px solid var(--b);border-radius:12px;overflow:hidden;}
.dl{display:flex;gap:10px;padding:11px 15px;border-bottom:1px solid var(--b);align-items:flex-start;}
.dl:last-child{border-bottom:none;}
.sp{background:var(--n);color:white;border-radius:50%;width:25px;height:25px;display:flex;align-items:center;justify-content:center;font-size:0.65rem;font-weight:700;flex-shrink:0;margin-top:2px;}
.sp.b{background:var(--r);}
.dt .dp{color:var(--n);font-weight:500;font-size:0.87rem;line-height:1.5;}
.dt .ds{color:var(--r);font-size:0.79rem;margin-top:2px;line-height:1.5;}
/* QUIZ */
.quiz-tabs{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.qtab{padding:7px 14px;border-radius:20px;font-size:0.76rem;font-weight:600;cursor:pointer;border:2px solid var(--b);background:white;color:#888;transition:all 0.18s;font-family:'Be Vietnam Pro',sans-serif;}
.qtab:hover{border-color:var(--n);color:var(--n);}
.qtab.active{background:var(--n);color:white;border-color:var(--n);}
.qtab.done{background:var(--gr);color:white;border-color:var(--gr);}
.qw{background:white;border:1px solid var(--b);border-radius:12px;overflow:hidden;}
.qt{background:var(--n);color:white;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;}
.qtl{display:flex;align-items:center;gap:8px;}
.qt h3{font-family:'Playfair Display',serif;font-size:0.92rem;}
.db{background:var(--g);color:var(--d);padding:2px 8px;border-radius:20px;font-size:0.62rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;}
.qs{display:flex;gap:10px;font-size:0.68rem;color:rgba(255,255,255,0.7);}
.qs span strong{color:var(--g);}
.qi{padding:18px 16px;}
.qp{height:5px;background:var(--b);border-radius:3px;margin-bottom:12px;}
.qpb{height:100%;background:linear-gradient(90deg,var(--r),var(--g));border-radius:3px;transition:width 0.4s;}
.qm{font-size:0.68rem;color:#bbb;text-align:right;margin-bottom:7px;}
.qtl2{font-size:0.64rem;text-transform:uppercase;letter-spacing:1.5px;color:#aaa;text-align:center;margin-bottom:4px;}
.qq{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:14px;}
.qq p{font-family:'Playfair Display',serif;font-size:1.25rem;color:var(--n);line-height:1.4;text-align:center;}
.qq button{background:none;border:none;font-size:1rem;cursor:pointer;opacity:0.4;flex-shrink:0;transition:opacity 0.15s;}
.qq button:hover{opacity:1;}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:12px;}
.opt{padding:10px 11px;border:2px solid var(--b);border-radius:9px;background:white;cursor:pointer;font-family:'Be Vietnam Pro',sans-serif;font-size:0.85rem;color:var(--d);transition:all 0.15s;text-align:center;line-height:1.4;}
.opt:hover:not(:disabled){border-color:var(--n);background:#f4f6ff;}
.opt.ok{border-color:var(--gr);background:#eafaf1;color:var(--gr);font-weight:600;}
.opt.ko{border-color:var(--r);background:var(--lr);color:var(--r);}
.fb{padding:8px 12px;border-radius:8px;font-weight:600;font-size:0.84rem;margin-bottom:10px;display:none;align-items:center;gap:8px;flex-wrap:wrap;}
.fb.ok{background:#eafaf1;color:var(--gr);display:flex;}
.fb.ko{background:var(--lr);color:var(--r);display:flex;}
.fb .spkb{background:none;border:1.5px solid currentColor;border-radius:6px;padding:2px 8px;cursor:pointer;font-size:0.7rem;font-family:'Be Vietnam Pro',sans-serif;color:inherit;flex-shrink:0;}
.fr{text-align:center;margin-bottom:12px;}
.fi{border:2px solid var(--b);border-radius:8px;padding:9px 14px;font-family:'Be Vietnam Pro',sans-serif;font-size:0.97rem;outline:none;width:100%;max-width:360px;transition:border-color 0.2s;background:white;color:var(--d);}
.fi:focus{border-color:var(--n);}
.fi.ok{border-color:var(--gr);background:#eafaf1;}
.fi.ko{border-color:var(--r);background:var(--lr);}
.qn{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;}
.btn{padding:8px 18px;border-radius:8px;font-family:'Be Vietnam Pro',sans-serif;font-size:0.79rem;font-weight:600;cursor:pointer;border:none;transition:all 0.16s;text-transform:uppercase;letter-spacing:0.4px;}
.btn.n{background:var(--n);color:white;}.btn.n:hover{background:#253a5e;}
.btn.r{background:var(--r);color:white;}.btn.r:hover{background:#a93226;}
.btn.o{background:transparent;border:2px solid var(--b);color:var(--d);}.btn.o:hover{border-color:var(--n);}
.btn.g{background:var(--gr);color:white;}.btn.g:hover{background:#235a3d;}
.btn.pu{background:var(--pu);color:white;}.btn.pu:hover{background:#5b2a70;}
/* MATCH exercise */
.match-wrap{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.mcol{display:flex;flex-direction:column;gap:6px;}
.mitem{padding:9px 12px;border:2px solid var(--b);border-radius:8px;cursor:pointer;font-size:0.84rem;text-align:center;transition:all 0.16s;background:white;}
.mitem:hover{border-color:var(--n);}
.mitem.sel{border-color:var(--g);background:var(--lg);}
.mitem.ok{border-color:var(--gr);background:#eafaf1;color:var(--gr);cursor:default;}
.mitem.ko{border-color:var(--r);background:var(--lr);animation:sh 0.3s ease;}
/* SORT exercise */
.sort-wrap{margin-bottom:14px;}
.sort-items{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:10px;min-height:42px;border:2px dashed var(--b);border-radius:8px;padding:8px;}
.sitem{padding:7px 14px;background:var(--n);color:white;border-radius:20px;cursor:pointer;font-size:0.83rem;transition:all 0.15s;}
.sitem:hover{background:var(--r);}
.sitem.placed{background:var(--gr);}
.sort-slots{display:flex;flex-wrap:wrap;gap:7px;min-height:42px;border:2px solid var(--b);border-radius:8px;padding:8px;}
.slot{min-width:90px;padding:7px 14px;border:2px dashed var(--b);border-radius:20px;font-size:0.83rem;color:#bbb;text-align:center;cursor:pointer;}
.slot.filled{background:var(--lgold);border-color:var(--g);color:var(--d);}
/* BATTLE mode */
.battle-wrap{background:white;border:2px solid var(--or);border-radius:12px;overflow:hidden;margin-bottom:16px;}
.battle-head{background:var(--or);color:white;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;}
.battle-head h4{font-family:'Playfair Display',serif;font-size:0.95rem;}
.timer{font-size:1.4rem;font-weight:700;font-family:'Playfair Display',serif;min-width:48px;text-align:right;}
.timer.warn{color:#FFEEAA;}
.timer.crit{color:#FF6666;animation:pulse 0.5s infinite;}
.battle-body{padding:16px;}
/* RESULT */
.res{text-align:center;padding:28px 14px;}
.res .re{font-size:3.2rem;}
.res .rs{font-family:'Playfair Display',serif;font-size:2.6rem;color:var(--n);margin:10px 0 5px;}
.res .rm{color:#555;margin-bottom:12px;font-size:0.94rem;line-height:1.6;}
.rbd{display:flex;justify-content:center;gap:14px;margin-bottom:16px;flex-wrap:wrap;}
.rbi{background:var(--lg);border-radius:10px;padding:8px 14px;text-align:center;}
.rbi strong{display:block;font-size:1.3rem;color:var(--n);font-family:'Playfair Display',serif;}
.rbi span{font-size:0.67rem;color:#888;text-transform:uppercase;letter-spacing:1px;}
.xp-bar{height:8px;background:var(--b);border-radius:4px;margin:10px 0;}
.xp-fill{height:100%;background:linear-gradient(90deg,var(--pu),#9B59B6);border-radius:4px;transition:width 1s ease;}
/* PROGRESS page */
.prog-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:20px;}
.prog-card{background:white;border:1px solid var(--b);border-radius:12px;padding:14px;}
.prog-card .emoji{font-size:1.6rem;display:block;margin-bottom:6px;}
.prog-card h4{font-size:0.9rem;color:var(--n);font-weight:600;margin-bottom:6px;}
.prog-bar{height:6px;background:var(--b);border-radius:3px;}
.prog-fill{height:100%;border-radius:3px;transition:width 0.6s;}
.prog-fill.c0{background:var(--r);}
.prog-fill.c1{background:var(--or);}
.prog-fill.c2{background:var(--g);}
.prog-fill.c3{background:var(--gr);}
.prog-fill.c4{background:var(--pu);}
.prog-fill.c5{background:var(--n);}
.prog-pct{font-size:0.7rem;color:#aaa;margin-top:3px;}
/* MISC */
@keyframes sh{0%,100%{transform:translateX(0);}25%{transform:translateX(-5px);}75%{transform:translateX(5px);}}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
@keyframes pop{0%{transform:scale(0.8);opacity:0;}60%{transform:scale(1.1);}100%{transform:scale(1);opacity:1;}}
.pop{animation:pop 0.3s ease forwards;}
.toast{position:fixed;top:80px;left:50%;transform:translateX(-50%);background:var(--n);color:white;padding:10px 20px;border-radius:20px;font-size:0.85rem;font-weight:600;z-index:999;opacity:0;transition:opacity 0.3s;pointer-events:none;}
.toast.show{opacity:1;}
.xp-toast{position:fixed;top:80px;right:20px;background:var(--pu);color:white;padding:8px 16px;border-radius:20px;font-size:0.82rem;font-weight:700;z-index:999;opacity:0;transition:all 0.3s;pointer-events:none;}
.xp-toast.show{opacity:1;}

/* ══════════════════════════════════════
   MOBILE RESPONSIVE — full rewrite
   ══════════════════════════════════════ */

/* ── BOTTOM NAV BAR on mobile ── */
@media(max-width:700px){

  /* Header compact */
  header{
    padding:10px 14px;
    border-bottom-width:3px;
  }
  header h1{ font-size:1.05rem; }
  header h1 span{ font-size:0.58rem; letter-spacing:1.5px; }
  .hstats{ gap:6px; }
  .sb{ padding:5px 10px; font-size:0.68rem; }
  .sb strong{ font-size:1.1rem; }
  .lvl-box{ padding:5px 9px; font-size:0.66rem; }
  .lvl-box span{ font-size:0.95rem; }
  .streak-box{ font-size:0.7rem; padding:5px 9px; }

  /* Hide top nav, use bottom bar instead */
  nav{
    display:none;
  }

  /* Bottom navigation bar */
  #bottomNav{
    display:flex !important;
    position:fixed;
    bottom:0; left:0; right:0;
    background:var(--n);
    border-top:2px solid var(--g);
    z-index:300;
    overflow-x:auto;
    -webkit-overflow-scrolling:touch;
    scrollbar-width:none;
    padding-bottom:env(safe-area-inset-bottom);
  }
  #bottomNav::-webkit-scrollbar{ display:none; }
  .bnav-item{
    flex:0 0 auto;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:8px 14px 6px;
    cursor:pointer;
    font-size:0.58rem;
    color:rgba(255,255,255,0.5);
    font-family:'Be Vietnam Pro',sans-serif;
    font-weight:500;
    text-transform:uppercase;
    letter-spacing:0.5px;
    border-bottom:3px solid transparent;
    transition:all 0.18s;
    min-width:64px;
    text-align:center;
    border:none;
    background:none;
    white-space:nowrap;
  }
  .bnav-item .bnav-emoji{ font-size:1.3rem; display:block; margin-bottom:2px; }
  .bnav-item.active{ color:var(--g); border-bottom:3px solid var(--g); }
  .bnav-item.done .bnav-emoji::after{ content:'✓'; font-size:0.55rem; color:var(--gr); vertical-align:super; margin-left:1px; }

  /* Main wrap — leave room for bottom nav */
  .mw{
    padding:16px 12px 90px;
  }

  /* Section header */
  .sh{ margin-bottom:18px; }
  .sh .be{ font-size:2.2rem; }
  .sh h2{ font-size:1.5rem; }
  .sh .st{ font-size:0.82rem; }
  .pn{ font-size:0.8rem; padding:9px 13px; margin-top:8px; }

  /* Block titles */
  .bt{ font-size:0.9rem; margin:18px 0 8px; }

  /* Vocab grid — 2 cols on phone */
  .vg{
    grid-template-columns: repeat(2, 1fr);
    gap:8px;
  }
  .vc{ padding:10px; min-height:76px; }
  .vc .wp{ font-size:0.9rem; }
  .vc .pr{ font-size:0.6rem; }
  .vc .ws{ font-size:0.82rem; }
  .vc .ex{ font-size:0.67rem; }

  /* Dialogue */
  .dl{ padding:10px 12px; gap:8px; }
  .dt .dp{ font-size:0.82rem; }
  .dt .ds{ font-size:0.75rem; }
  .sp{ width:22px; height:22px; font-size:0.6rem; }

  /* Quiz tabs — scrollable pills */
  .quiz-tabs{
    flex-wrap:nowrap;
    overflow-x:auto;
    -webkit-overflow-scrolling:touch;
    scrollbar-width:none;
    gap:6px;
    padding-bottom:4px;
    margin-bottom:10px;
  }
  .quiz-tabs::-webkit-scrollbar{ display:none; }
  .qtab{
    flex:0 0 auto;
    padding:6px 12px;
    font-size:0.7rem;
    white-space:nowrap;
  }

  /* Quiz body */
  .qi{ padding:14px 12px; }
  .qm{ font-size:0.65rem; }
  .qtl2{ font-size:0.62rem; letter-spacing:1px; }
  .qq p{ font-size:1.1rem; }

  /* Options — single column, bigger touch targets */
  .opts{
    grid-template-columns:1fr;
    gap:7px;
  }
  .opt{
    padding:13px 14px;
    font-size:0.88rem;
    border-radius:10px;
  }

  /* Fill input */
  .fi{
    width:100%;
    max-width:100%;
    font-size:0.95rem;
    padding:12px 14px;
  }

  /* Buttons */
  .btn{ padding:10px 18px; font-size:0.78rem; }
  .qn{ gap:8px; }

  /* Match exercise */
  .match-wrap{
    grid-template-columns:1fr 1fr;
    gap:8px;
  }
  .mitem{
    padding:9px 8px;
    font-size:0.78rem;
    border-radius:8px;
  }

  /* Result screen */
  .res{ padding:20px 12px; }
  .res .re{ font-size:2.8rem; }
  .res .rs{ font-size:2.2rem; }
  .rbd{ gap:10px; }
  .rbi{ padding:7px 12px; }
  .rbi strong{ font-size:1.1rem; }
  .rbi span{ font-size:0.62rem; }

  /* Battle mode */
  .battle-head h4{ font-size:0.85rem; }
  .timer{ font-size:1.2rem; }
  .battle-body{ padding:12px; }

  /* Toasts */
  .toast{ font-size:0.8rem; padding:8px 16px; top:70px; }
  .xp-toast{ font-size:0.75rem; padding:6px 12px; top:70px; right:14px; }

  /* Progress notes */
  .pn{ font-size:0.79rem; line-height:1.65; }
}

/* Very small screens */
@media(max-width:380px){
  .vg{ grid-template-columns:1fr; }
  .match-wrap{ grid-template-columns:1fr; }
  .sh h2{ font-size:1.3rem; }
  .bnav-item{ min-width:56px; padding:7px 10px 5px; }
  .bnav-item .bnav-emoji{ font-size:1.1rem; }
}
.mw{padding:14px 10px 60px;}
  .opts{grid-template-columns:1fr;}.sh h2{font-size:1.4rem;}
  .qs{display:none;}.hstats{gap:8px;}
  .match-wrap{grid-template-columns:1fr;}
}
</style>
</head>
<body>
<div id="toast" class="toast"></div>
<div id="xptoast" class="xp-toast"></div>
<header>
  <div class="logo">
    <span style="font-size:22px">🇻🇳🇫🇷</span>
    <h1>Apprendre ensemble <span>Học cùng nhau · FR ↔ VI</span></h1>
  </div>
  <div class="hstats">
    <div class="streak-box" id="streakBox">🔥 <span id="streakNum">0</span></div>
    <div class="lvl-box">Niv. <span id="lvlNum">1</span></div>
    <div class="sb"><strong id="sv">0</strong>points</div>
  </div>
</header>
<nav id="nav"></nav>
<div class="mw" id="mw"></div>

<script>
var C=[{"emoji": "👋", "title": "Les salutations", "subtitle": "Lời chào", "tab": "Les salutations", "note": "<b>Xin chào</b> est universel. Les formules varient selon l'âge : <em>Chào anh</em> (homme plus âgé), <em>Chào em</em> (plus jeune). La bise est française ; au Vietnam on serre la main. Le vouvoiement français n'existe pas en vietnamien, mais les pronoms (<em>anh, chị, em</em>) jouent ce rôle.", "lp": "fr-FR", "ls": "vi-VN", "vocab": [{"p": "Bonjour", "s": "Xin chào", "pr": "sin tsào", "ep": "Bonjour, comment allez-vous ?", "es": "Xin chào, bạn có khỏe không ?"}, {"p": "Bonsoir", "s": "Chào buổi tối", "pr": "tsào buổi tối", "ep": "Bonsoir à tous !", "es": "Chào buổi tối mọi người !"}, {"p": "Bonne nuit", "s": "Chúc ngủ ngon", "pr": "tsúk ngủ ngon", "ep": "Bonne nuit, dors bien !", "es": "Chúc ngủ ngon, ngủ ngon nhé !"}, {"p": "Au revoir", "s": "Tạm biệt", "pr": "tam biệt", "ep": "Au revoir, à demain !", "es": "Tạm biệt, hẹn gặp lại !"}, {"p": "À bientôt", "s": "Hẹn gặp lại", "pr": "hẹn gap lại", "ep": "À bientôt !", "es": "Hẹn gặp lại !"}, {"p": "Merci", "s": "Cảm ơn", "pr": "kảm ơn", "ep": "Merci beaucoup !", "es": "Cảm ơn rất nhiều !"}, {"p": "De rien", "s": "Không có gì", "pr": "không kó gì", "ep": "Merci ! De rien !", "es": "Cảm ơn ! Không có gì !"}, {"p": "S'il vous plaît", "s": "Xin vui lòng", "pr": "sin vuì lòng", "ep": "S'il vous plaît, aidez-moi.", "es": "Xin vui lòng giúp tôi."}, {"p": "Oui", "s": "Vâng", "pr": "vâng", "ep": "Oui, je comprends.", "es": "Vâng, tôi hiểu."}, {"p": "Non", "s": "Không", "pr": "không", "ep": "Non, merci.", "es": "Không, cảm ơn."}, {"p": "Excusez-moi", "s": "Xin lỗi", "pr": "sin lỗi", "ep": "Excusez-moi, où est la gare ?", "es": "Xin lỗi, ga tàu ở đâu ?"}, {"p": "Pardon", "s": "Xin thứ lỗi", "pr": "sin thứ lỗi", "ep": "Pardon, je n'ai pas compris.", "es": "Xin thứ lỗi, tôi chưa hiểu."}, {"p": "Comment allez-vous", "s": "Bạn có khỏe không", "pr": "ban kó kẻ không", "ep": "Comment allez-vous aujourd'hui ?", "es": "Hôm nay bạn có khỏe không ?"}, {"p": "Très bien", "s": "Rất tốt", "pr": "rất tốt", "ep": "Je vais très bien, merci !", "es": "Tôi rất tốt, cảm ơn !"}, {"p": "Je m'appelle", "s": "Tôi tên là", "pr": "tôi tên là", "ep": "Je m'appelle Sophie.", "es": "Tôi tên là Sophie."}, {"p": "Enchanté", "s": "Rất vui được gặp", "pr": "rất vui đượk gap", "ep": "Enchanté, je suis Paul.", "es": "Rất vui được gặp, tôi là Paul."}, {"p": "Bienvenue", "s": "Chào mừng", "pr": "tsào mừng", "ep": "Bienvenue à Paris !", "es": "Chào mừng đến Paris !"}, {"p": "Félicitations", "s": "Chúc mừng", "pr": "tsúk mừng", "ep": "Félicitations pour ton mariage !", "es": "Chúc mừng đám cưới của bạn !"}, {"p": "Bonne chance", "s": "Chúc may mắn", "pr": "tsúk may mắn", "ep": "Bonne chance pour l'examen !", "es": "Chúc may mắn trong kỳ thi !"}, {"p": "Santé", "s": "Chúc sức khỏe", "pr": "tsúk sứk kẻ", "ep": "Santé ! À votre santé !", "es": "Chúc sức khỏe !"}], "dlg": [{"sp": "A", "p": "Bonjour ! Je m'appelle Léa. Comment allez-vous ?", "s": "Xin chào ! Tôi tên là Léa. Bạn có khỏe không ?"}, {"sp": "B", "p": "Bonjour Léa ! Très bien, merci. Je m'appelle Minh.", "s": "Xin chào Léa ! Rất tốt, cảm ơn. Tôi tên là Minh."}, {"sp": "A", "p": "Enchanté, Minh ! Vous êtes vietnamien ?", "s": "Rất vui được gặp, Minh ! Bạn là người Việt Nam à ?"}, {"sp": "B", "p": "Oui, de Hanoï. Et vous, vous êtes française ?", "s": "Vâng, tôi là người Hà Nội. Còn bạn, bạn là người Pháp à ?"}, {"sp": "A", "p": "Oui, de Lyon. Bienvenue à Paris !", "s": "Vâng, tôi là người Lyon. Chào mừng đến Paris !"}, {"sp": "B", "p": "Merci beaucoup ! À bientôt !", "s": "Cảm ơn rất nhiều ! Hẹn gặp lại !"}]}, {"emoji": "🏠", "title": "La maison", "subtitle": "Ngôi nhà", "tab": "La maison", "note": "<b>Phòng</b> = pièce en vietnamien. Les maisons vietnamiennes traditionnelles (<em>nhà cổ</em>) sont orientées vers le sud. Les appartements (<em>căn hộ</em>) se développent dans les grandes villes. En France, on distingue appartement et maison individuelle (<em>pavillon</em>).", "lp": "fr-FR", "ls": "vi-VN", "vocab": [{"p": "La maison", "s": "Ngôi nhà", "pr": "ngôi nhà", "ep": "Ma maison est grande.", "es": "Ngôi nhà của tôi rộng."}, {"p": "L'appartement", "s": "Căn hộ", "pr": "kăn hộ", "ep": "J'habite dans un appartement.", "es": "Tôi sống trong một căn hộ."}, {"p": "La chambre", "s": "Phòng ngủ", "pr": "phòng ngủ", "ep": "Ma chambre est bleue.", "es": "Phòng ngủ của tôi màu xanh."}, {"p": "La cuisine", "s": "Phòng bếp", "pr": "phòng bếp", "ep": "Je cuisine dans la cuisine.", "es": "Tôi nấu ăn trong phòng bếp."}, {"p": "La salle de bain", "s": "Phòng tắm", "pr": "phòng tắm", "ep": "La salle de bain est propre.", "es": "Phòng tắm sạch sẽ."}, {"p": "Le salon", "s": "Phòng khách", "pr": "phòng khách", "ep": "Nous regardons la télé au salon.", "es": "Chúng tôi xem TV ở phòng khách."}, {"p": "La porte", "s": "Cái cửa", "pr": "kái cửa", "ep": "Fermez la porte.", "es": "Xin đóng cửa lại."}, {"p": "La fenêtre", "s": "Cái cửa sổ", "pr": "kái cửa sổ", "ep": "La fenêtre est ouverte.", "es": "Cái cửa sổ đang mở."}, {"p": "Le jardin", "s": "Khu vườn", "pr": "ku vườn", "ep": "Nous jouons dans le jardin.", "es": "Chúng tôi chơi trong khu vườn."}, {"p": "Le toit", "s": "Mái nhà", "pr": "mái nhà", "ep": "Le toit est rouge.", "es": "Mái nhà màu đỏ."}, {"p": "Le mur", "s": "Bức tường", "pr": "bứk tường", "ep": "Le mur est blanc.", "es": "Bức tường màu trắng."}, {"p": "Le sol", "s": "Sàn nhà", "pr": "sàn nhà", "ep": "Le sol est propre.", "es": "Sàn nhà sạch sẽ."}, {"p": "La table", "s": "Cái bàn", "pr": "kái bàn", "ep": "La table est ronde.", "es": "Cái bàn tròn."}, {"p": "La chaise", "s": "Cái ghế", "pr": "kái ghế", "ep": "Asseyez-vous sur la chaise.", "es": "Ngồi vào cái ghế."}, {"p": "Le lit", "s": "Cái giường", "pr": "kái giường", "ep": "Je dors dans mon lit.", "es": "Tôi ngủ trên giường."}, {"p": "L'armoire", "s": "Tủ quần áo", "pr": "tủ kwan áo", "ep": "Mes vêtements sont dans l'armoire.", "es": "Quần áo tôi ở trong tủ."}, {"p": "Le réfrigérateur", "s": "Tủ lạnh", "pr": "tủ lạnh", "ep": "Le réfrigérateur est plein.", "es": "Tủ lạnh đầy thức ăn."}, {"p": "La télévision", "s": "Tivi", "pr": "ti-vi", "ep": "J'allume la télévision.", "es": "Tôi bật tivi."}, {"p": "L'escalier", "s": "Cầu thang", "pr": "kầu thang", "ep": "Je monte l'escalier.", "es": "Tôi leo cầu thang."}, {"p": "Le balcon", "s": "Ban công", "pr": "ban công", "ep": "Je prends le café sur le balcon.", "es": "Tôi uống cà phê ở ban công."}], "dlg": [{"sp": "A", "p": "Bienvenue chez moi ! Voici le salon.", "s": "Chào mừng đến nhà tôi ! Đây là phòng khách."}, {"sp": "B", "p": "Merci ! Ta maison est très belle. Tu as un jardin ?", "s": "Cảm ơn ! Nhà bạn đẹp lắm. Bạn có khu vườn không ?"}, {"sp": "A", "p": "Oui, le jardin est derrière la maison.", "s": "Có, khu vườn ở phía sau nhà."}, {"sp": "B", "p": "Et c'est quoi, là-haut ? Un balcon ?", "s": "Còn cái đó trên kia là gì ? Một ban công à ?"}, {"sp": "A", "p": "Oui ! J'adore prendre mon café là-haut le matin.", "s": "Vâng ! Tôi rất thích uống cà phê ở đó vào buổi sáng."}, {"sp": "B", "p": "Super ! La cuisine est à droite ?", "s": "Tuyệt ! Phòng bếp ở bên phải à ?"}]}, {"emoji": "☀️", "title": "La météo", "subtitle": "Thời tiết", "tab": "La météo", "note": "En français : <b>il fait + adjectif</b>. En vietnamien : <b>trời + adjectif</b>. Le Vietnam a 3 zones : nord (4 saisons), centre (très chaud, typhons), sud (mùa khô / mùa mưa). La météo est un sujet de conversation quotidien dans les deux cultures.", "lp": "fr-FR", "ls": "vi-VN", "vocab": [{"p": "Il fait chaud", "s": "Trời nóng", "pr": "trời nóng", "ep": "Il fait très chaud aujourd'hui.", "es": "Hôm nay trời rất nóng."}, {"p": "Il fait froid", "s": "Trời lạnh", "pr": "trời lạnh", "ep": "Il fait froid en hiver.", "es": "Mùa đông trời lạnh."}, {"p": "Il pleut", "s": "Trời mưa", "pr": "trời mưa", "ep": "Il pleut depuis ce matin.", "es": "Trời mưa từ sáng đến giờ."}, {"p": "Il neige", "s": "Trời có tuyết", "pr": "trời kó tuyết", "ep": "Il neige en décembre.", "es": "Tháng 12 trời có tuyết."}, {"p": "Il fait soleil", "s": "Trời nắng", "pr": "trời nắng", "ep": "Il fait beau soleil !", "es": "Trời nắng đẹp !"}, {"p": "Il fait beau", "s": "Trời đẹp", "pr": "trời đẹp", "ep": "Il fait beau ce matin !", "es": "Sáng nay trời đẹp !"}, {"p": "Il fait mauvais", "s": "Trời xấu", "pr": "trời sấu", "ep": "Il fait mauvais, reste à la maison.", "es": "Trời xấu, ở nhà thôi."}, {"p": "Nuageux", "s": "Nhiều mây", "pr": "nhiều mây", "ep": "Le ciel est nuageux.", "es": "Bầu trời nhiều mây."}, {"p": "Venteux", "s": "Có gió", "pr": "kó gió", "ep": "Il fait venteux aujourd'hui.", "es": "Hôm nay có gió."}, {"p": "L'orage", "s": "Cơn bão", "pr": "kơn bão", "ep": "Il y a un orage ce soir.", "es": "Tối nay có cơn bão."}, {"p": "La pluie", "s": "Mưa", "pr": "mưa", "ep": "J'aime la pluie.", "es": "Tôi thích mưa."}, {"p": "Le soleil", "s": "Mặt trời", "pr": "mặt trời", "ep": "Le soleil brille.", "es": "Mặt trời sáng chói."}, {"p": "La neige", "s": "Tuyết", "pr": "tuyết", "ep": "La neige est blanche.", "es": "Tuyết màu trắng."}, {"p": "Le vent", "s": "Gió", "pr": "gió", "ep": "Le vent est fort.", "es": "Gió rất mạnh."}, {"p": "Le brouillard", "s": "Sương mù", "pr": "sương mù", "ep": "Il y a du brouillard ce matin.", "es": "Sáng nay có sương mù."}, {"p": "L'arc-en-ciel", "s": "Cầu vồng", "pr": "kầu vồng", "ep": "Regarde l'arc-en-ciel !", "es": "Nhìn kìa, có cầu vồng !"}, {"p": "La chaleur", "s": "Nóng bức", "pr": "nóng bứk", "ep": "La chaleur est insupportable.", "es": "Nóng bức không chịu được."}, {"p": "La tempête", "s": "Bão tố", "pr": "bão tố", "ep": "Une tempête arrive.", "es": "Bão tố đang đến."}, {"p": "L'humidité", "s": "Độ ẩm", "pr": "độ ẩm", "ep": "L'humidité est élevée.", "es": "Độ ẩm rất cao."}, {"p": "La sécheresse", "s": "Hạn hán", "pr": "hạn hán", "ep": "La sécheresse dure depuis des mois.", "es": "Hạn hán đã kéo dài mấy tháng."}], "dlg": [{"sp": "A", "p": "Quel temps fait-il aujourd'hui ?", "s": "Hôm nay thời tiết thế nào ?"}, {"sp": "B", "p": "Il fait chaud et il y a du soleil. Mais ce soir il y aura un orage.", "s": "Trời nóng và có nắng. Nhưng tối nay sẽ có cơn bão."}, {"sp": "A", "p": "Vraiment ? Je déteste les orages.", "s": "Thật sao ? Tôi ghét bão lắm."}, {"sp": "B", "p": "Moi j'adore ! La pluie après la chaleur, c'est agréable.", "s": "Còn tôi thích lắm ! Mưa sau cái nóng bức thì dễ chịu lắm."}, {"sp": "A", "p": "Tu as regardé la météo pour demain ?", "s": "Bạn đã xem dự báo thời tiết cho ngày mai chưa ?"}, {"sp": "B", "p": "Oui, il y aura de l'arc-en-ciel après la pluie !", "s": "Rồi, sau cơn mưa sẽ có cầu vồng !"}]}, {"emoji": "🐶", "title": "Les animaux", "subtitle": "Các con vật", "tab": "Les animaux", "note": "En vietnamien, les animaux sont précédés du classificateur <b>con</b>. Au Vietnam, le buffle (<em>con trâu</em>) est emblématique de la campagne. Les 12 animaux du zodiaque vietnamien diffèrent du chinois : le chat remplace le lapin dans le zodiaque vietnamien !", "lp": "fr-FR", "ls": "vi-VN", "vocab": [{"p": "Le chien", "s": "Con chó", "pr": "kon tsó", "ep": "Mon chien s'appelle Rex.", "es": "Con chó của tôi tên Rex."}, {"p": "Le chat", "s": "Con mèo", "pr": "kon méo", "ep": "Le chat dort sur le canapé.", "es": "Con mèo ngủ trên ghế sofa."}, {"p": "L'oiseau", "s": "Con chim", "pr": "kon tsim", "ep": "L'oiseau chante le matin.", "es": "Con chim hót vào buổi sáng."}, {"p": "Le poisson", "s": "Con cá", "pr": "kon ká", "ep": "Le poisson nage dans l'eau.", "es": "Con cá bơi trong nước."}, {"p": "Le lapin", "s": "Con thỏ", "pr": "kon thọ", "ep": "Le lapin mange des carottes.", "es": "Con thỏ ăn cà rốt."}, {"p": "Le cheval", "s": "Con ngựa", "pr": "kon ngựa", "ep": "Le cheval court vite.", "es": "Con ngựa chạy nhanh."}, {"p": "La vache", "s": "Con bò", "pr": "kon bò", "ep": "La vache donne du lait.", "es": "Con bò cho sữa."}, {"p": "Le buffle", "s": "Con trâu", "pr": "kon trâu", "ep": "Le buffle travaille dans les champs.", "es": "Con trâu làm việc ngoài đồng."}, {"p": "L'éléphant", "s": "Con voi", "pr": "kon voi", "ep": "L'éléphant est grand et fort.", "es": "Con voi to lớn và mạnh mẽ."}, {"p": "Le tigre", "s": "Con hổ", "pr": "kon hổ", "ep": "Le tigre est dangereux.", "es": "Con hổ rất nguy hiểm."}, {"p": "Le singe", "s": "Con khỉ", "pr": "kon kỉ", "ep": "Le singe mange une banane.", "es": "Con khỉ ăn chuối."}, {"p": "Le serpent", "s": "Con rắn", "pr": "kon rắn", "ep": "Le serpent est long.", "es": "Con rắn rất dài."}, {"p": "Le crocodile", "s": "Con cá sấu", "pr": "kon ká sấu", "ep": "Le crocodile est dans le fleuve.", "es": "Con cá sấu ở dưới sông."}, {"p": "Le canard", "s": "Con vịt", "pr": "kon vịt", "ep": "Le canard nage dans le lac.", "es": "Con vịt bơi trên hồ."}, {"p": "Le cochon", "s": "Con lợn", "pr": "kon lợn", "ep": "Le cochon est dans la ferme.", "es": "Con lợn ở trong trang trại."}, {"p": "La poule", "s": "Con gà mái", "pr": "kon gà mái", "ep": "La poule pond des oeufs.", "es": "Con gà mái đẻ trứng."}, {"p": "Le papillon", "s": "Con bướm", "pr": "kon bướm", "ep": "Le papillon est beau.", "es": "Con bướm rất đẹp."}, {"p": "La fourmi", "s": "Con kiến", "pr": "kon kiến", "ep": "Les fourmis sont courageuses.", "es": "Những con kiến rất dũng cảm."}, {"p": "Le moustique", "s": "Con muỗi", "pr": "kon muỗi", "ep": "Le moustique pique.", "es": "Con muỗi đốt đau."}, {"p": "Le dragon", "s": "Con rồng", "pr": "kon rồng", "ep": "Le dragon est un symbole en Asie.", "es": "Con rồng là biểu tượng ở châu Á."}], "dlg": [{"sp": "A", "p": "Tu as un animal de compagnie ?", "s": "Bạn có nuôi thú cưng không ?"}, {"sp": "B", "p": "Oui, j'ai un chien et deux chats. Et toi ?", "s": "Có, tôi có một con chó và hai con mèo. Còn bạn ?"}, {"sp": "A", "p": "Moi j'ai un lapin. Il s'appelle Cacahuète.", "s": "Tôi có một con thỏ. Nó tên là Cacahuète."}, {"sp": "B", "p": "Adorable ! Tu sais que dans le zodiaque vietnamien, le chat remplace le lapin ?", "s": "Dễ thương quá ! Bạn có biết trong 12 con giáp Việt Nam, con mèo thay thế con thỏ không ?"}, {"sp": "A" // ── TTS ───────────────────────────────────────────────────────────────
var _viVoice=null, _frVoice=null, _vLoaded=false;
function _loadVoices(){
  if(_vLoaded)return;
  var vs=window.speechSynthesis?speechSynthesis.getVoices():[];
  vs.forEach(function(v){
    if(!_viVoice&&v.lang.toLowerCase().startsWith('vi'))_viVoice=v;
    if(!_frVoice&&v.lang.toLowerCase().startsWith('fr'))_frVoice=v;
  });
  if(vs.length>0)_vLoaded=true;
}
if(window.speechSynthesis){
  speechSynthesis.onvoiceschanged=function(){_vLoaded=false;_loadVoices();};
  setTimeout(_loadVoices,300);
}
function _gTTS(text,lang,cb){
  var tl=lang.startsWith('vi')?'vi':'fr';
  var url='https://translate.google.com/translate_tts?ie=UTF-8&tl='+tl+'&client=tw-ob&q='+encodeURIComponent(text);
  var a=new Audio(url);
  a.onerror=function(){if(cb)cb();};
  a.play().catch(function(){if(cb)cb();});
}
function _wSpeak(t,l,v){
  if(!window.speechSynthesis)return;
  try{
    speechSynthesis.cancel();
    var u=new SpeechSynthesisUtterance(t);
    u.lang=l; u.rate=0.84;
    if(v)u.voice=v;
    speechSynthesis.speak(u);
  }catch(e){}
}
function spk(t,l){
  if(!t)return;
  _loadVoices();
  var isVi=l&&l.startsWith('vi');
  if(!isVi){_wSpeak(t,l,_frVoice);return;}
  if(_viVoice){_wSpeak(t,l,_viVoice);return;}
  var vs=window.speechSynthesis?speechSynthesis.getVoices():[];
  for(var i=0;i<vs.length;i++){if(vs[i].lang.toLowerCase().startsWith('vi')){_viVoice=vs[i];_wSpeak(t,l,_viVoice);return;}}
  _gTTS(t,l,function(){_wSpeak(t,'vi-VN',null);});
}

// ── XP & GAMIFICATION ─────────────────────────────────────────────────
var XP_TABLE=[0,50,120,200,300,420,560,720,900,1100,1320];
function addXP(pts){
  xp+=pts;
  var newLvl=1;
  for(var i=1;i<XP_TABLE.length;i++){if(xp>=XP_TABLE[i])newLvl=i+1;}
  if(newLvl>lvl){
    lvl=newLvl;
    document.getElementById('lvlNum').textContent=lvl;
    showToast('⬆️ Niveau suivant ! ' + lvl, 'xp');
  }
}
function addScore(n){
  ts+=n; document.getElementById('sv').textContent=ts;
  streak++;
  addXP(n*2);
  var sb=document.getElementById('streakBox');
  document.getElementById('streakNum').textContent=streak;
  if(streak>=3){
    sb.style.display='block';
    if(streak%5===0) showToast('🔥 Série de '+streak+' correct(s) !');
  }
}
function resetStreak(){
  streak=0;
  document.getElementById('streakBox').style.display='none';
}
function showToast(msg, type){
  var el=type==='xp'?document.getElementById('xptoast'):document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(function(){el.classList.remove('show');},2200);
}
function updateProg(ci,pct){
  progData[ci]=Math.max(progData[ci]||0, pct);
  if(pct>=70){
    var bn=document.getElementById('bnav'+ci);
    if(bn) bn.classList.add('done');
  }
}

// ── QUESTION GENERATORS ─────────────────────────────────────────────────
function shuf(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1)),t=a[i];a[i]=a[j];a[j]=t;}return a;}
function rnd(arr,n){return shuf(arr.slice()).slice(0,n);}

function makeQ(c,mode){
  var v=c.vocab, n=v.length, qs=[];
  if(mode==='mcq'){
    // 8 MCQ p→s
    rnd(v,8).forEach(function(cor){
      var pool=v.filter(function(x){return x!==cor;}); shuf(pool);
      var opts=[cor].concat(pool.slice(0,3)); shuf(opts);
      qs.push({t:'mcq',dir:'FR → VI',q:cor.p,ans:cor.s,opts:opts.map(function(o){return o.s;}),spk:cor.s,sl:c.ls,ql:c.lp});
    });
    // 6 MCQ s→p
    rnd(v,6).forEach(function(cor){
      var pool=v.filter(function(x){return x!==cor;}); shuf(pool);
      var opts=[cor].concat(pool.slice(0,3)); shuf(opts);
      qs.push({t:'mcq',dir:'VI → FR',q:cor.s,ans:cor.p,opts:opts.map(function(o){return o.p;}),spk:cor.p,sl:c.lp,ql:c.ls});
    });
    // 4 MCQ phrase→word
    rnd(v,4).forEach(function(cor){
      var pool=v.filter(function(x){return x!==cor;}); shuf(pool);
      var opts=[cor].concat(pool.slice(0,3)); shuf(opts);
      var blanked=cor.ep.replace(new RegExp(cor.p.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'i'),'_____');
      var qtext=blanked+' [→ '+cor.p+']';
      qs.push({t:'mcq',dir:'PHRASE',q:qtext,ans:cor.s,opts:opts.map(function(o){return o.s;}),spk:cor.s,sl:c.ls});
    });
  } else if(mode==='fill'){
    // 7 fill p→s
    rnd(v,7).forEach(function(x){qs.push({t:'fill',dir:'FR → VI',q:x.p,ans:x.s,spk:x.s,sl:c.ls,ql:c.lp});});
    // 5 fill s→p
    rnd(v,5).forEach(function(x){qs.push({t:'fill',dir:'VI → FR',q:x.s,ans:x.p,spk:x.p,sl:c.lp,ql:c.ls});});
  } else if(mode==='fill2'){
    // 10 fill s→p (harder direction)
    rnd(v,10).forEach(function(x){qs.push({t:'fill',dir:'VI → FR',q:x.s,ans:x.p,spk:x.p,sl:c.lp,ql:c.ls});});
    rnd(v,5).forEach(function(x){qs.push({t:'fill',dir:'FR → VI',q:x.p,ans:x.s,spk:x.s,sl:c.ls,ql:c.lp});});
  } else if(mode==='phrase'){
    // phrase→word MCQ (10 phrases)
    rnd(v,10).forEach(function(cor){
      var pool=v.filter(function(x){return x!==cor;}); shuf(pool);
      var opts=[cor].concat(pool.slice(0,3)); shuf(opts);
      var blanked=cor.ep.replace(new RegExp(cor.p.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'i'),'_____');
      var qtext=blanked+' [→ '+cor.p+']';
      qs.push({t:'mcq',dir:'PHRASE',q:qtext,ans:cor.s,opts:opts.map(function(o){return o.s;}),spk:cor.s,sl:c.ls});
    });
    // exemple s→p
    rnd(v,8).forEach(function(cor){
      var pool=v.filter(function(x){return x!==cor;}); shuf(pool);
      var opts=[cor].concat(pool.slice(0,3)); shuf(opts);
      var blanked2=cor.es.replace(new RegExp(cor.s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'i'),'_____');
      var qtext2=blanked2+' [→ '+cor.s+']';
      qs.push({t:'mcq',dir:'PHRASE',q:qtext2,ans:cor.p,opts:opts.map(function(o){return o.p;}),spk:cor.p,sl:c.lp});
    });
  } else if(mode==='match'){
    // 4 blocks of 5 match pairs
    var groups=[];
    var vshuf=shuf(v.slice());
    for(var g=0;g<4;g++){
      groups.push({t:'match',pairs:vshuf.slice(g*5,g*5+5),lp:c.lp,ls:c.ls});
    }
    return groups;
  } else if(mode==='rev'){
    // reverse: s→p MCQ with 8 items
    rnd(v,8).forEach(function(cor){
      var pool=v.filter(function(x){return x!==cor;}); shuf(pool);
      var opts=[cor].concat(pool.slice(0,3)); shuf(opts);
      qs.push({t:'mcq',dir:'VI → FR',q:cor.s,ans:cor.p,opts:opts.map(function(o){return o.p;}),spk:cor.p,sl:c.lp,ql:c.ls});
    });
    rnd(v,7).forEach(function(x){qs.push({t:'fill',dir:'VI → FR',q:x.s,ans:x.p,spk:x.p,sl:c.lp,ql:c.ls});});
    rnd(v,5).forEach(function(cor){
      var pool=v.filter(function(x){return x!==cor;}); shuf(pool);
      var opts=[cor].concat(pool.slice(0,3)); shuf(opts);
      qs.push({t:'mcq',dir:'PHRASE',q:cor.es,ans:cor.p,opts:opts.map(function(o){return o.p;}),spk:cor.p,sl:c.lp});
    });
  }
  return qs;
}

// ── RENDER QUESTION ─────────────────────────────────────────────────────
function renderQ(ci){
  var d=qd[ci], body=document.getElementById('qb'+ci);
  if(!body)return;
  if(!d.q||d.q.length===0){d.q=makeQ(C[ci],'mcq');}
  if(d.mode==='match'){renderMatch(ci,0);return;}
  if(d.i>=d.q.length){renderRes(ci);return;}
  var q=d.q[d.i], tot=d.q.length, pct=Math.round((d.i/tot)*100);
  document.getElementById('dir'+ci).textContent=q.dir;
  body.innerHTML='';
  var prog=document.createElement('div'); prog.className='qp';
  var bar=document.createElement('div'); bar.className='qpb'; bar.style.width=pct+'%';
  prog.appendChild(bar); body.appendChild(prog);
  var meta=document.createElement('p'); meta.className='qm';
  meta.textContent='Question '+(d.i+1)+' / '+tot; body.appendChild(meta);
  var tl=document.createElement('p'); tl.className='qtl2';
  tl.textContent=(q.t==='mcq'&&q.dir==='PHRASE'?'Phrase':q.t==='mcq'?'Choix multiple'+" · "+q.dir:'Compléter'+" · "+q.dir);
  body.appendChild(tl);
  var qrow=document.createElement('div'); qrow.className='qq';
  var qp=document.createElement('p'); qp.textContent=q.q; qp.classList.add('pop');
  var qb=document.createElement('button'); qb.innerHTML='🔊';
  var qlang=q.ql||C[ci].lp;
  (function(t,l){qb.onclick=function(){spk(t,l);};})(q.q,qlang);
  qrow.appendChild(qp); qrow.appendChild(qb); body.appendChild(qrow);
  var fb=document.createElement('div'); fb.className='fb'; fb.id='fb'+ci; body.appendChild(fb);
  if(q.t==='mcq'){
    var grid=document.createElement('div'); grid.className='opts';
    q.opts.forEach(function(opt){
      var btn=document.createElement('button'); btn.className='opt'; btn.textContent=opt;
      (function(o,a,sk,sl){btn.onclick=function(){chkMCQ(ci,btn,o,a,sk,sl);};})(opt,q.ans,q.spk,q.sl);
      grid.appendChild(btn);
    });
    body.appendChild(grid);
  } else {
    var fr=document.createElement('div'); fr.className='fr';
    var inp=document.createElement('input');
    inp.type='text'; inp.className='fi'; inp.id='fi'+ci;
    inp.placeholder=''; inp.autocomplete='off'; inp.spellcheck=false;
    fr.appendChild(inp); body.appendChild(fr);
    var nav=document.createElement('div'); nav.className='qn';
    var cb=document.createElement('button'); cb.className='btn n'; cb.textContent='Vérifier ✓';
    (function(a,sk,sl){
      cb.onclick=function(){chkFill(ci,a,sk,sl);};
      inp.addEventListener('keydown',function(e){if(e.key==='Enter')chkFill(ci,a,sk,sl);});
    })(q.ans,q.spk,q.sl);
    nav.appendChild(cb); body.appendChild(nav);
    setTimeout(function(){inp.focus();},100);
  }
  var nav2=document.createElement('div'); nav2.className='qn'; nav2.style.marginTop='9px';
  var nb=document.createElement('button'); nb.className='btn o'; nb.textContent='Suivante →';
  nb.id='nx'+ci; nb.style.display='none';
  (function(x){nb.onclick=function(){qd[x].i++;renderQ(x);};})(ci);
  nav2.appendChild(nb); body.appendChild(nav2);
}

// ── MATCH EXERCISE ────────────────────────────────────────────────────
var matchState={};
function renderMatch(ci,groupIdx){
  var body=document.getElementById('qb'+ci);
  if(!body)return;
  var groups=qd[ci].q;
  if(groupIdx>=groups.length){renderMatchRes(ci);return;}
  var g=groups[groupIdx];
  matchState[ci]={groupIdx:groupIdx,pairs:g.pairs,selLeft:null,selRight:null,matched:0,lp:g.lp,ls:g.ls};
  body.innerHTML='';
  var lbl=document.createElement('p'); lbl.className='qtl2';
  lbl.textContent='Associer'+" — "+'FR → VI'+" ("+( groupIdx+1)+"/"+groups.length+")";
  body.appendChild(lbl);
  var fb=document.createElement('div'); fb.className='fb'; fb.id='fb'+ci; body.appendChild(fb);
  var wrap=document.createElement('div'); wrap.className='match-wrap';
  var lCol=document.createElement('div'); lCol.className='mcol';
  var rCol=document.createElement('div'); rCol.className='mcol';
  var leftItems=shuf(g.pairs.map(function(p){return p.p;}));
  var rightItems=shuf(g.pairs.map(function(p){return p.s;}));
  leftItems.forEach(function(txt,idx){
    var it=document.createElement('div'); it.className='mitem'; it.textContent=txt;
    it.dataset.val=txt; it.dataset.side='L';
    it.onclick=function(){doMatchClick(ci,it,'L');};
    lCol.appendChild(it);
  });
  rightItems.forEach(function(txt,idx){
    var it=document.createElement('div'); it.className='mitem'; it.textContent=txt;
    it.dataset.val=txt; it.dataset.side='R';
    it.onclick=function(){doMatchClick(ci,it,'R');};
    rCol.appendChild(it);
  });
  wrap.appendChild(lCol); wrap.appendChild(rCol);
  body.appendChild(wrap);
  var nav2=document.createElement('div'); nav2.className='qn'; nav2.style.marginTop='9px';
  var nb=document.createElement('button'); nb.className='btn o'; nb.textContent='Suivante →';
  nb.id='nx'+ci; nb.style.display='none';
  (function(x,gi){nb.onclick=function(){renderMatch(x,gi+1);};})(ci,groupIdx);
  nav2.appendChild(nb); body.appendChild(nav2);
}

function doMatchClick(ci,el,side){
  var ms=matchState[ci];
  if(el.classList.contains('ok'))return;
  if(side==='L'){
    document.querySelectorAll('#qb'+ci+' .mitem[data-side="L"]').forEach(function(i){if(!i.classList.contains('ok'))i.classList.remove('sel');});
    el.classList.toggle('sel');
    ms.selLeft=el.classList.contains('sel')?el:null;
  } else {
    document.querySelectorAll('#qb'+ci+' .mitem[data-side="R"]').forEach(function(i){if(!i.classList.contains('ok'))i.classList.remove('sel');});
    el.classList.toggle('sel');
    ms.selRight=el.classList.contains('sel')?el:null;
  }
  if(ms.selLeft&&ms.selRight){
    var lv=ms.selLeft.dataset.val, rv=ms.selRight.dataset.val;
    var correct=ms.pairs.some(function(p){return p.p===lv&&p.s===rv;});
    if(correct){
      ms.selLeft.classList.remove('sel'); ms.selLeft.classList.add('ok');
      ms.selRight.classList.remove('sel'); ms.selRight.classList.add('ok');
      ms.matched++;
      qd[ci].ok = (qd[ci].ok||0) + 1;
      ms.selLeft=null; ms.selRight=null;
      addScore(2); spk(rv,ms.ls);
      if(ms.matched===ms.pairs.length){
        showToast('Correct !');
        document.getElementById('nx'+ci).style.display='inline-block';
      }
    } else {
      ms.selLeft.classList.add('ko'); ms.selRight.classList.add('ko');
      qd[ci].ko = (qd[ci].ko||0) + 1;
      resetStreak();
      setTimeout(function(){
        ms.selLeft.classList.remove('sel','ko');
        ms.selRight.classList.remove('sel','ko');
        ms.selLeft=null; ms.selRight=null;
      },500);
    }
  }
}

// ── CHECK MCQ ────────────────────────────────────────────────────────
function chkMCQ(ci,btn,chosen,ans,sk,sl){
  var btns=btn.parentElement.querySelectorAll('.opt');
  btns.forEach(function(b){b.disabled=true;});
  var fb=document.getElementById('fb'+ci), nx=document.getElementById('nx'+ci);
  var ok=(chosen===ans);
  if(ok){btn.classList.add('ok');addScore(1);qd[ci].ok++;}
  else{btn.classList.add('ko');btns.forEach(function(b){if(b.textContent===ans)b.classList.add('ok');});qd[ci].ko++;resetStreak();}
  fb.className='fb '+(ok?'ok':'ko');
  fb.className='fb '+(ok?'ok':'ko');
  fb.innerHTML=mkFb(ok,ans,sk,sl);
  spk(sk,sl); updStats(ci);
  if(nx)nx.style.display='inline-block';
}

// ── CHECK FILL ───────────────────────────────────────────────────────
function chkFill(ci,ans,sk,sl){
  var inp=document.getElementById('fi'+ci);
  if(!inp||inp.disabled)return;
  var val=inp.value.trim(), fb=document.getElementById('fb'+ci), nx=document.getElementById('nx'+ci);
  inp.disabled=true;
  function norm(s){return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();}
  var ok=(norm(val)===norm(ans));
  if(ok){inp.classList.add('ok');addScore(2);qd[ci].ok++;}
  else{inp.classList.add('ko');qd[ci].ko++;resetStreak();}
  fb.className='fb '+(ok?'ok':'ko');
  fb.className='fb '+(ok?'ok':'ko');
  fb.innerHTML=mkFb(ok,ans,sk,sl);
  spk(sk,sl); updStats(ci);
  if(nx)nx.style.display='inline-block';
}

function updStats(ci){
  var d=qd[ci];
  var eo=document.getElementById('ok'+ci),ek=document.getElementById('ko'+ci),et=document.getElementById('tot'+ci);
  if(eo)eo.textContent=d.ok;
  if(ek)ek.textContent=d.ko;
  if(et)et.textContent=(d.i+1)+'/'+d.q.length;
}

// ── RESULT ───────────────────────────────────────────────────────────

function renderMatchRes(ci){
  var body=document.getElementById('qb'+ci);
  if(!body) return;
  var d=qd[ci];
  var ok=d.ok||0, ko=d.ko||0, tot=ok+ko;
  var pct=tot>0?Math.round((ok/tot)*100):0;
  var em=pct>=90?'🏆':pct>=75?'🎉':pct>=55?'👍':pct>=35?'📚':'💪';
  var msg=pct>=90?'Parfait ! Xuất sắc !':pct>=75?'Très bien ! Làm tốt !':pct>=55?'Pas mal ! Encore un effort !':'Continue à pratiquer !';
  document.getElementById('dir'+ci).textContent='✓';
  updateProg(ci,pct);
  var tab=document.getElementById('tab'+ci);
  if(tab&&pct>=70) tab.classList.add('done');
  body.innerHTML=
    '<div class="res">'+
    '<div class="re pop">'+em+'</div>'+
    '<div class="rs">'+ok+' / '+tot+'</div>'+
    '<div class="rbd">'+
    '<div class="rbi"><strong>'+ok+'</strong><span>Corrects</span></div>'+
    '<div class="rbi"><strong>'+ko+'</strong><span>Incorrects</span></div>'+
    '<div class="rbi"><strong>'+pct+'%</strong><span>Score</span></div>'+
    '</div>'+
    '<div class="rm">'+msg+'</div>'+
    '<button class="btn r" id="rmr'+ci+'">🔄 Recommencer</button>'+
    '</div>';
  document.getElementById('rmr'+ci).onclick=function(){
    qd[ci]={q:makeQ(C[ci],'match'),i:0,sc:0,ok:0,ko:0,mode:'match',done:false};
    renderMatch(ci,0);
  };
}

function renderRes(ci){
  var body=document.getElementById('qb'+ci), d=qd[ci], tot=d.q.length;
  var pct=Math.round((d.sc||d.ok)/tot*100);
  var em=pct>=90?'🏆':pct>=75?'🎉':pct>=55?'👍':pct>=35?'📚':'💪';
  var msg=pct>=90?'Parfait ! Xuất sắc !':pct>=75?'Très bien ! Làm tốt !':pct>=55?'Pas mal ! Encore un effort !':'Continue à pratiquer !';
  document.getElementById('dir'+ci).textContent='✓';
  updateProg(ci,pct);
  var tab=document.getElementById('tab'+ci);
  if(tab&&pct>=70)tab.classList.add('done');
  body.innerHTML='<div class="res"><div class="re pop">'+em+'</div><div class="rs">'+d.ok+' / '+tot+'</div><div class="rbd"><div class="rbi"><strong>'+d.ok+'</strong><span>Corrects</span></div><div class="rbi"><strong>'+d.ko+'</strong><span>Incorrects</span></div><div class="rbi"><strong>'+pct+'%</strong><span>Score</span></div></div><div class="rm">'+msg+'</div><button class="btn r" id="rs'+ci+'">🔄 Recommencer</button></div>';
  (function(x){
    document.getElementById('rs'+x).onclick=function(){
      var mode=qd[x].mode||'mcq';
      qd[x]={q:makeQ(C[x],mode),i:0,sc:0,ok:0,ko:0,mode:mode,done:false};
      document.getElementById('dir'+x).textContent=C[x].lp;
      renderQ(x);
    };
  })(ci);
}

// ── BATTLE MODE ───────────────────────────────────────────────────────
var battleTimer=null, battleLeft=0, battleCi=-1, battleScore=0;
function startBattle(ci){
  // Stop any existing timer
  if(battleTimer){ clearInterval(battleTimer); battleTimer=null; }

  var body=document.getElementById('qb'+ci);
  if(!body) return;

  // Build only pure MCQ questions (no match groups, no ambiguous phrases)
  var v=C[ci].vocab, qs=[];
  var vshuf=shuf(v.slice());
  vshuf.forEach(function(cor){
    var pool=v.filter(function(x){return x!==cor;}); shuf(pool);
    var opts=[cor].concat(pool.slice(0,3)); shuf(opts);
    // FR→VI
    qs.push({q:cor.p, ans:cor.s, opts:opts.map(function(o){return o.s;}), spk:cor.s, sl:C[ci].ls});
  });
  var vshuf2=shuf(v.slice());
  vshuf2.forEach(function(cor){
    var pool=v.filter(function(x){return x!==cor;}); shuf(pool);
    var opts=[cor].concat(pool.slice(0,3)); shuf(opts);
    // VI→FR
    qs.push({q:cor.s, ans:cor.p, opts:opts.map(function(o){return o.p;}), spk:cor.p, sl:C[ci].lp});
  });
  shuf(qs);
  if(!qs.length) return;

  battleCi=ci; battleLeft=60; battleScore=0;
  var qIdx=0;
  var battleId='battle'+ci; // unique ID per course

  body.innerHTML=
    '<div class="battle-wrap">'+
    '<div class="battle-head">'+
    '<h4>⚡ Mode Chrono — '+C[ci].title+'</h4>'+
    '<div class="timer" id="btimer'+ci+'">60</div>'+
    '</div>'+
    '<div class="battle-body" id="bbody'+ci+'"></div>'+
    '</div>';

  function nextBQ(){
    if(qIdx>=qs.length) qIdx=0;
    var q=qs[qIdx++];
    var bb=document.getElementById('bbody'+ci);
    if(!bb) return;
    bb.innerHTML='';
    var ql=document.createElement('p');
    ql.style.cssText='font-family:Playfair Display,serif;font-size:1.2rem;color:var(--n);text-align:center;margin-bottom:14px;';
    ql.textContent=q.q;
    bb.appendChild(ql);
    var grid=document.createElement('div'); grid.className='opts';
    q.opts.forEach(function(opt){
      var btn=document.createElement('button'); btn.className='opt'; btn.textContent=opt;
      (function(o,a,sk,sl){
        btn.onclick=function(){
          if(battleLeft<=0) return;
          grid.querySelectorAll('.opt').forEach(function(b){b.disabled=true;});
          var ok=(o===a);
          if(ok){ battleScore++; addScore(1); spk(sk,sl); btn.classList.add('ok'); }
          else  { btn.classList.add('ko'); resetStreak(); }
          var sc=document.getElementById('bscore'+ci);
          if(sc) sc.textContent='Score : '+battleScore;
          setTimeout(nextBQ, 380);
        };
      })(opt, q.ans, q.spk, q.sl);
      grid.appendChild(btn);
    });
    bb.appendChild(grid);
    var sc=document.createElement('p');
    sc.id='bscore'+ci;
    sc.style.cssText='text-align:center;font-size:0.8rem;color:#aaa;margin-top:10px;font-weight:600;';
    sc.textContent='Score : '+battleScore;
    bb.appendChild(sc);
  }

  nextBQ();

  battleTimer=setInterval(function(){
    battleLeft--;
    var timer=document.getElementById('btimer'+ci);
    if(!timer){ clearInterval(battleTimer); battleTimer=null; return; }
    timer.textContent=battleLeft;
    timer.className='timer'+(battleLeft<=10?' crit':battleLeft<=20?' warn':'');
    if(battleLeft<=0){
      clearInterval(battleTimer); battleTimer=null;
      var bb=document.getElementById('bbody'+ci);
      if(bb){
        bb.innerHTML=
          '<div style="text-align:center;padding:24px">'+
          '<p style="font-size:2rem;margin-bottom:8px">⏱️</p>'+
          '<p style="font-size:1.3rem;font-weight:700;color:var(--r);font-family:Playfair Display,serif">Temps écoulé !</p>'+
          '<p style="font-size:1rem;color:#555;margin-top:10px">Score final : <strong style=\'color:var(--n);font-size:1.4rem\'>'+battleScore+'</strong> pts</p>'+
          '<button class="btn g" style="margin-top:16px" onclick="startBattle('+ci+')">🔄 Rejouer</button>'+
          '</div>';
      }
    }
  },1000);
}

function mkFb(ok, ans, sk, sl) {
  var icon = ok ? '\u2713' : '\u2717';
  var msg = ok ? 'Correct !' : 'Incorrect. Reponse :' + ' <b>' + ans + '</b>';
  var safesk = sk.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
  return icon + ' ' + msg + '&nbsp;&nbsp;<button class="spkb" onclick="spk(\'' + safesk + '\',\'' + sl + '\')">[son] Ecouter</button>';
}


// ── BOTTOM NAV for mobile ──────────────────────────────────────
function buildBottomNav(){
  var existing = document.getElementById('bottomNav');
  if(existing) existing.remove();
  var bn = document.createElement('div');
  bn.id = 'bottomNav';
  bn.style.display = 'none'; // shown via CSS on mobile
  C.forEach(function(c,i){
    var item = document.createElement('button');
    item.className = 'bnav-item' + (i===0?' active':'');
    item.id = 'bnav'+i;
    item.innerHTML = '<span class="bnav-emoji">'+c.emoji+'</span><span>'+c.tab.split(' ').slice(0,2).join(' ')+'</span>';
    (function(x){ item.onclick = function(){ sw(x); }; })(i);
    bn.appendChild(item);
  });
  document.body.appendChild(bn);
}

var _origSw = sw;
sw = function(i){
  _origSw(i);
  // sync bottom nav
  document.querySelectorAll('.bnav-item').forEach(function(b,x){
    b.classList.toggle('active', x===i);
  });
};

initNav(); buildAll(); buildBottomNav();
C.forEach(function(c,i){ qd[i].q=makeQ(c,'mcq'); renderQ(i); });
